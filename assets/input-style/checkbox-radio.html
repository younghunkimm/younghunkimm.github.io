<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox & Radio Custom Style</title>

    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="./checkbox-radio.css">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="card">
                <div class="card-title">
                    <h2>Checkbox</h2>
                </div>

                <div class="card-body">
                    <input type="checkbox" id="check1" name="check1" class="form-check-input">
                    <label for="check1" class="form-check-label">Unchecked</label>
                    <input type="checkbox" id="check2" name="check2" class="form-check-input" checked>
                    <label for="check2" class="form-check-label">Checked</label>
                    <input type="checkbox" id="check3" name="check3" class="form-check-input" disabled>
                    <label for="check3" class="form-check-label">Disalbed</label>
                </div>

                <div class="card-title">
                    <h2>Radio</h2>
                </div>

                <div class="card-body">
                    <input type="radio" name="radio" id="radio1" class="form-check-input">
                    <label for="radio1" class="form-check-label">Unchecked</label>
                    <input type="radio" name="radio" id="radio2" class="form-check-input" checked>
                    <label for="radio2" class="form-check-label">checked</label>
                    <input type="radio" name="radio" id="radio3" class="form-check-input" disabled>
                    <label for="radio3" class="form-check-label">Disalbed</label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
